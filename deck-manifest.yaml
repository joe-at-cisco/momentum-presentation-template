      - "Born October 16, 1977; grew up in Connecticut and gravitated early to blues rock and Stevie Ray Vaughan."
      - "Brief Berklee College of Music studies, then the Atlanta singer-songwriter circuit—building a live fanbase before mainstream radio."
      - "Debut studio LP Room for Squares (2001, wide release 2003) catalyzed hits like \"Your Body Is a Wonderland\" and established his melodic, conversational songwriting voice."
    footer: true
    speaker_notes: "Emphasize live-first credibility—his career was never only studio polish."

  - number: 5
    layout: "content-single-column-right"
    slide_pre_title: "Career arc"
    title: "Continuum & artistic pivot"
    body:
      - "Continuum (2006) widened his blues vocabulary and guitar hero credibility—tracks like \"Gravity\" and \"Waiting on the World to Change\" balanced FM hooks with extended solo sections live."
      - "Grammy recognition and evolving production choices (from polished pop-rock to rootsier textures on later albums) show a long arc rather than a single \"sound era.\""
    footer: true

